<body>

  <!-- SECRET BUTTON UNDER PRO PLAN (already there) -->
  <div class="price-card featured">
    <!-- ... existing Pro card content ... -->
    <a onclick="openStream()" class="secret-video-btn">📼 view videos</a>
  </div>

  <!-- STREAMING OVERLAY (same as before) -->
  <div id="stream-overlay"> ... </div>

<script>
const SHOW = {
  title: "Young Sheldon",
  seasons: [
    {
      season: 1,
      episodes: [
        { ep:1, title:"Pilot", file:"videos/YoungsheldonS01E01.mp4" },
        { ep:2, title:"Rockets, Communists, and the Dewey Decimal System", file:null },
        // ... rest of your episodes
      ]
    }
  ]
};

let curSeason = 1, curEpIdx = null;

// === DEBUG HELPER ===
function logVideoStatus(msg) {
  console.log('%c[StreamVault] ' + msg, 'color:#7fff6e; font-weight:bold');
}

// === BUILD FUNCTIONS (unchanged) ===
function buildSeasons() { /* same as before */ }
function buildEps() { /* same as before */ }

function playEp(idx) {
  const sd = SHOW.seasons.find(s => s.season === curSeason);
  if (!sd) return;
  const ep = sd.episodes[idx];
  if (!ep || !ep.file) return;

  curEpIdx = idx;
  buildEps();

  const video = document.getElementById('s-video');
  const ph = document.getElementById('s-placeholder');

  logVideoStatus('Attempting to load: ' + ep.file);

  video.src = ep.file;
  video.style.display = 'block';
  ph.style.display = 'none';

  video.load();

  video.play()
    .then(() => logVideoStatus('✅ Video started playing'))
    .catch(err => {
      console.error('%c[StreamVault] Play failed:', err);
      logVideoStatus('❌ Could not play video – check console for details');
    });

  // update UI
  const tag = 'S' + String(curSeason).padStart(2,'0') + 'E' + String(ep.ep).padStart(2,'0');
  document.getElementById('s-np-title').textContent = ep.title;
  document.getElementById('s-np-sub').textContent = SHOW.title + ' · ' + tag;
  document.getElementById('s-bc-ep').textContent = tag + ' — ' + ep.title;
}

window.openStream = function() {
  document.getElementById('stream-overlay').classList.add('active');
  buildSeasons();
  buildEps();

  const sd = SHOW.seasons.find(s => s.season === curSeason);
  if (sd) {
    const first = sd.episodes.findIndex(e => e.file);
    if (first !== -1) playEp(first);
  }
};

window.closeStream = function() { /* same as before */ };

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('stream-overlay').classList.contains('active'))
    window.closeStream();
});
</script>
</body>
</html>
